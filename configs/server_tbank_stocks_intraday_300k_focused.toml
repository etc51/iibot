shadow_all_rejected = true

[golden_baseline.early_5m.trigger]
ema_window = 9
macd_fast = 12
macd_slow = 26
macd_signal = 9
rsi_window = 14
rsi_min = 25.0
rsi_max = 55.0
rolling_low_window_min = 6
rolling_low_window_max = 12
